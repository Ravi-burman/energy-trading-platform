<ngx-loading [show]="getDataLoading"></ngx-loading>
<div class="db-wrapper">
    <app-header></app-header>

    <section id="pageContent">
        <div class="pageContent-container custom-section">
          <p-card>
            <div class="tab-content">
                <div class="col-12">
                    <mat-form-field appearance="outline">
                        <mat-date-range-input class="btn btn-main-outline" [max]="maxDate" [rangePicker]="picker1"
                          [formGroup]="dateRange">
                          <input matStartDate formControlName="FromDate">
                          <input matEndDate formControlName="ToDate" (dateChange)="onDateRangeChange()">
                        </mat-date-range-input>
                        <mat-datepicker-toggle matIconSuffix [for]="picker1"></mat-datepicker-toggle>
                        <mat-date-range-picker #picker1></mat-date-range-picker>
                      </mat-form-field>
                  </div>
                  <div class="col-12">
                    <mat-error *ngIf="dateRange.get('ToDate').hasError('required')">
                      Please select To Date
                    </mat-error>
                  </div>
                <plotly-plot [data]="graph.graphOutageData" [layout]="graph.layout"
                [config]="graph.config"></plotly-plot>
            </div>
          </p-card>
        </div>
        <section id="footer">© Greenko Group. All rights reserved</section>
    </section>
</div>
