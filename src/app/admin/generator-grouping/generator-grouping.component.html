<div class="db-wrapper">
    <app-header></app-header>
  
    <p-toast position="top-right"></p-toast>
<section id="pageContent">
    <div class="pageContent-container" >
<h1 style="color: green;">
    Generators Grouping
</h1>
<!-- <h3>
    Angular PrimeNG Drag and Drop Component
</h3> -->
<h1>
    <button (click)="start()">data</button>
</h1>
 
<div class="grid">
    <!-- <div class="row"> -->
        <!-- First table -->
        <div [ngClass]="{'col-12': !collapsed, 'md:col-12': !collapsed, 'md:col-6': collapsed}" class="drag-column">
            <p-table [value]="available" responsiveLayout="scroll">
                <ng-template pTemplate="header">
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-person>
                    <tr pDraggable="products" (onDragStart)="dragStart(person);" (onDrag)="drag()" (onDragEnd)="dragEnd()">
                        <td>{{person.name}}</td>
                        <td>{{person.age}}</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    
        <!-- Second table -->
        <div *ngIf="collapsed" class="col-12 md:col-6" pDroppable="products" (onDrop)="drop()" responsiveLayout="scroll">
            <p-table [value]="selected">
                <ng-template pTemplate="header">
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-person>
                    <tr pDroppable="products" (onDrop)="drop()" (onDragOver)="allowDrop($event)">
                        <td>{{person.name}}</td>
                        <td>{{person.age}}</td>
                    </tr>
                </ng-template>
            </p-table>
        </div>
    <!-- </div> -->
    
</div>
    </div>
</section>
</div>
<!-- <p-toast [preventOpenDuplicates]="true"></p-toast> -->
